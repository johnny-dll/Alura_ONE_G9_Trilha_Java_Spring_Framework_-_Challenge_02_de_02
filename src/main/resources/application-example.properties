# ===============================
# DATABASE (exemplo)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/forumhub
spring.datasource.username=forumhubadmin
spring.datasource.password=AQUI_A_SENHA_DO_BANCO_DE_DADOS
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# LOGGING (opcional mas útil)
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# JWT CONFIG (exemplo)
# ===============================
# Preencha com suas variáveis de ambiente ou arquivo local real
jwt.secret=SEU_SEGREDO_JWT_AQUI
# jwt.expiration em milissegundos (7200000ms = 2 horas)
jwt.expiration=7200000